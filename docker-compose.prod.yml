services:
  frontend:
    container_name: ${PROJECT_NAME:-demo}-frontend
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-7005}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    container_name: ${PROJECT_NAME:-demo}-backend
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8006}:8000"
    env_file:
      - .env.docker
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  postgres:
    container_name: ${PROJECT_NAME:-demo}-postgres
    image: postgres:16-alpine
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeThisPassword}
    volumes:
      - app_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  app_pg_data:
  app_uploads:
